<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Sharp Monitor</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=JetBrains+Mono:wght@400;500;700&family=Epilogue:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#080808; --surface:#111; --surface2:#181818; --border:#222; --border2:#2a2a2a;
  --green:#00ff87; --red:#ff3d5a; --yellow:#ffc107; --blue:#00b4d8; --muted:#555; --dim:#2a2a2a;
  --text:#f0f0f0;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{background:var(--bg);color:var(--text);font-family:'Epilogue',sans-serif;font-size:14px;min-height:100vh;padding-bottom:40px}
.header{background:var(--surface);border-bottom:1px solid var(--border);padding:14px 16px 10px;position:sticky;top:0;z-index:100}
.header-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.logo{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:.1em}
.logo span{color:var(--green)}
.snap-count{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--muted)}
.snap-count b{color:var(--green)}
.tabs{display:flex;gap:4px}
.tab{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:.1em;text-transform:uppercase;padding:6px 12px;border-radius:3px;border:1px solid var(--border2);background:none;color:var(--muted);cursor:pointer;transition:all .15s}
.tab.active{background:var(--green);color:#000;border-color:var(--green);font-weight:700}
.paste-section{padding:14px 16px;border-bottom:1px solid var(--border)}
.paste-label{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:.12em;color:var(--muted);text-transform:uppercase;margin-bottom:8px;display:flex;align-items:center;gap:8px}
.dot{width:6px;height:6px;border-radius:50%;background:var(--green);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.book-btns{display:flex;gap:6px;margin-bottom:8px;align-items:center}
.book-btn{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:.1em;padding:6px 14px;border-radius:3px;cursor:pointer;transition:all .15s;font-weight:400}
.book-indicator{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:.08em;margin-left:4px}
textarea{width:100%;background:var(--surface2);border:1px solid var(--border2);border-radius:4px;color:var(--text);font-family:'JetBrains Mono',monospace;font-size:11px;padding:10px;resize:none;height:90px;outline:none;transition:border-color .2s;line-height:1.5}
textarea:focus{border-color:var(--green)}
textarea::placeholder{color:var(--muted)}
.paste-actions{display:flex;gap:8px;margin-top:8px}
.btn{font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.1em;text-transform:uppercase;padding:10px 16px;border-radius:3px;border:none;cursor:pointer;transition:all .15s;flex:1}
.btn-primary{background:var(--green);color:#000;font-weight:700}
.btn-primary:active{transform:scale(.97)}
.btn-secondary{background:var(--surface2);color:var(--muted);border:1px solid var(--border2);flex:0;padding:10px 14px}
.btn-secondary:hover{color:var(--text);border-color:#444}
.board-header{padding:12px 16px 8px;display:flex;align-items:center;justify-content:space-between}
.board-title{font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:.08em}
.baseline-bar{margin:0 16px 8px;padding:8px 12px;background:var(--surface);border:1px solid var(--border);border-radius:4px;font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--muted);display:flex;justify-content:space-between;align-items:center}
.summary-bar{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:var(--border);margin:0 16px 10px;border-radius:4px;overflow:hidden}
.sum-cell{background:var(--surface);padding:10px 8px;text-align:center}
.sum-num{font-family:'Bebas Neue',sans-serif;font-size:22px;line-height:1;margin-bottom:2px}
.sum-desc{font-family:'JetBrains Mono',monospace;font-size:8px;color:var(--muted);letter-spacing:.08em;line-height:1.3}
.filter-bar{padding:0 16px 10px;display:flex;gap:5px;overflow-x:auto;scrollbar-width:none}
.filter-bar::-webkit-scrollbar{display:none}
.chip{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:.08em;padding:5px 10px;border-radius:20px;border:1px solid var(--border2);background:none;color:var(--muted);cursor:pointer;white-space:nowrap;transition:all .15s}
.chip.active{background:var(--surface2);color:var(--text);border-color:#444}
.games-list{padding:0 16px;display:flex;flex-direction:column;gap:7px}
.game-card{background:var(--surface);border:1px solid var(--border);border-radius:6px;overflow:hidden;transition:border-color .2s}
.card-left-whale{border-left:3px solid var(--green)}
.card-left-trap{border-left:3px solid var(--red)}
.card-left-moved{border-left:3px solid var(--yellow)}
.card-header{padding:10px 14px 8px;display:flex;align-items:start;justify-content:space-between;cursor:pointer;border-bottom:1px solid var(--border)}
.matchup-line{display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-top:5px}
.badge{font-family:'JetBrains Mono',monospace;font-size:9px;padding:2px 7px;border-radius:2px;letter-spacing:.08em;white-space:nowrap}
.badge-whale{background:rgba(0,255,135,.12);color:var(--green);border:1px solid rgba(0,255,135,.25)}
.badge-trap{background:rgba(255,61,90,.12);color:var(--red);border:1px solid rgba(255,61,90,.25)}
.badge-neutral{background:var(--surface2);color:var(--muted);border:1px solid var(--border2)}
.badge-moved{background:rgba(255,193,7,.1);color:var(--yellow);border:1px solid rgba(255,193,7,.2)}
.badge-score-strong{background:rgba(0,255,135,.1);color:var(--green);border:1px solid rgba(0,255,135,.3);font-weight:700}
.badge-score-mod{background:rgba(255,193,7,.1);color:var(--yellow);border:1px solid rgba(255,193,7,.2);font-weight:700}
.badge-score-weak{background:rgba(255,61,90,.1);color:var(--red);border:1px solid rgba(255,61,90,.2);font-weight:700}
.move-tag{font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:.05em}
.splits-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:1px;background:var(--border)}
.split-cell{background:var(--surface);padding:10px 12px}
.split-label{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--muted);letter-spacing:.1em;text-transform:uppercase;margin-bottom:6px}
.split-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:3px}
.split-team{font-size:11px;color:var(--muted);max-width:70px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.h-hot{color:var(--green);font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:500}
.h-cold{color:var(--muted);font-family:'JetBrains Mono',monospace;font-size:12px}
.h-bets{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--muted)}
.delta-row{padding:8px 14px;display:flex;align-items:center;justify-content:space-between;border-top:1px solid var(--border);background:var(--surface2)}
.delta-label{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--muted);letter-spacing:.06em}
.delta-pos{font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:700;color:var(--green)}
.delta-neg{font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:700;color:var(--red)}
.delta-neu{font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:700;color:var(--muted)}
.card-section{border-top:1px solid var(--border);padding:10px 14px}
.section-title{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--muted);letter-spacing:.12em;text-transform:uppercase;margin-bottom:6px;display:flex;justify-content:space-between;align-items:center}
.locked-val{font-family:'JetBrains Mono',monospace;font-size:18px;font-weight:700}
.input-row{display:flex;gap:6px;align-items:center;margin-top:4px}
.card-input{background:var(--surface2);border:1px solid var(--border2);border-radius:3px;color:var(--text);font-family:'JetBrains Mono',monospace;font-size:12px;padding:6px 8px;outline:none;flex:1}
.lock-btn{background:var(--blue);color:#000;border:none;border-radius:3px;font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:700;padding:6px 10px;cursor:pointer;white-space:nowrap}
.green-btn{background:var(--green)}
.edit-btn{font-family:'JetBrains Mono',monospace;font-size:9px;padding:3px 8px;border-radius:2px;border:1px solid var(--border2);background:none;color:var(--muted);cursor:pointer}
.mov-item{display:flex;align-items:center;gap:6px;font-family:'JetBrains Mono',monospace;font-size:10px;margin-bottom:4px}
.mov-time{color:var(--muted);min-width:48px}
.mov-field{color:var(--muted);min-width:52px}
.mov-from{color:var(--muted);text-decoration:line-through}
.mov-to{color:var(--text);font-weight:500}
.mov-up{color:var(--green)}
.mov-dn{color:var(--red)}
.expand-toggle{padding:6px 14px;text-align:center;cursor:pointer;border-top:1px solid var(--border)}
.expand-toggle span{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--muted);letter-spacing:.1em;text-transform:uppercase}
.expand-toggle:hover span{color:var(--text)}
.card-body-hidden{display:none}
.notes-ta{width:100%;background:var(--surface2);border:1px solid var(--border2);border-radius:3px;color:var(--text);font-family:'Epilogue',sans-serif;font-size:12px;padding:8px;resize:none;outline:none;line-height:1.5;margin-top:4px}
.log-row{display:grid;grid-template-columns:1fr 1fr auto;gap:6px;align-items:center;margin-top:4px}
.empty-state{text-align:center;padding:50px 24px;color:var(--muted)}
.empty-icon{font-size:36px;margin-bottom:14px;opacity:.4}
.empty-title{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:.1em;color:var(--text);margin-bottom:8px;opacity:.4}
.empty-desc{font-size:13px;line-height:1.6;max-width:260px;margin:0 auto;opacity:.5}
.history-panel{padding:0 16px}
.snap-card{background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:14px;margin-bottom:8px}
.snap-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.snap-time{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--green)}
.snap-meta{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--muted)}
.del-btn{background:none;border:1px solid var(--border2);color:var(--muted);font-size:10px;padding:3px 8px;border-radius:2px;cursor:pointer;font-family:'JetBrains Mono',monospace}
.del-btn:hover{border-color:var(--red);color:var(--red)}
.analytics-panel{padding:0 16px}
.a-section-title{font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:.05em;margin-bottom:8px;color:var(--text)}
.a-subtitle{font-size:11px;color:var(--muted);margin-bottom:10px}
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:3px;margin-bottom:14px}
.stat-cell{background:var(--surface);border:1px solid var(--border);border-radius:4px;padding:14px;text-align:center}
.stat-num{font-family:'Bebas Neue',sans-serif;font-size:30px;line-height:1;margin-bottom:4px}
.stat-desc{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--muted);letter-spacing:.08em;line-height:1.3}
.a-table{background:var(--surface);border:1px solid var(--border);border-radius:4px;margin-bottom:14px;overflow:hidden}
.a-row{padding:10px 14px;border-bottom:1px solid var(--border);display:grid;grid-template-columns:1fr auto auto;gap:8px;align-items:center}
.a-row-label{font-size:12px;font-weight:500}
.a-row-sub{font-size:10px;color:var(--muted);margin-top:2px}
.a-bar{height:4px;background:var(--dim);border-radius:2px;margin-top:4px}
.a-bar-fill{height:100%;border-radius:2px;transition:width .4s}
.a-pct{font-family:'JetBrains Mono',monospace;font-size:15px;font-weight:700}
.a-games{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--muted);text-align:right}
.flip-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.flip-box{background:var(--surface2);border-radius:3px;padding:10px;text-align:center}
.flip-box-label{font-size:10px;color:var(--muted);margin-bottom:4px}
.flip-box-val{font-family:'JetBrains Mono',monospace;font-size:18px;font-weight:700}
.warn-bar{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--yellow);background:rgba(255,214,0,.06);border:1px solid rgba(255,214,0,.2);border-radius:4px;padding:8px 12px;margin-bottom:12px;letter-spacing:.05em}
.book-section{background:var(--surface);border-radius:4px;margin-bottom:12px;overflow:hidden}
.book-header{padding:12px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.book-stats{display:flex;gap:16px}
.book-stat{text-align:center}
.book-stat-num{font-family:'JetBrains Mono',monospace;font-size:18px;font-weight:700}
.book-stat-label{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--muted)}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--green);color:#000;font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:700;letter-spacing:.08em;padding:10px 20px;border-radius:4px;transition:transform .3s;z-index:999;white-space:nowrap}
.toast.show{transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>
<div class="header">
  <div class="header-top">
    <div class="logo">SHARP<span>MONITOR</span></div>
    <div class="snap-count">SNAPS: <b id="snapCount">0</b></div>
  </div>
  <div class="tabs">
    <button class="tab active" onclick="showTab('board',this)">BOARD</button>
    <button class="tab" onclick="showTab('history',this)">HISTORY</button>
    <button class="tab" onclick="showTab('analytics',this)">ANALYTICS</button>
  </div>
</div>

<div class="paste-section">
  <div class="paste-label"><div class="dot"></div>PASTE VSIN DATA</div>
  <div class="book-btns">
    <button class="book-btn" id="btn-circa" onclick="setBook('Circa')" style="border:1px solid var(--green);background:var(--green);color:#000">CIRCA</button>
    <button class="book-btn" id="btn-dk" onclick="setBook('DraftKings')" style="border:1px solid var(--border2);background:none;color:var(--muted)">DRAFTKINGS</button>
    <span class="book-indicator" id="bookIndicator" style="color:var(--green)">● CIRCA</span>
  </div>
  <textarea id="pasteInput" placeholder="Run bookmarklet on VSiN, then paste here..."></textarea>
  <div class="paste-actions">
    <button class="btn btn-secondary" onclick="document.getElementById('pasteInput').value=''">CLR</button>
    <button class="btn btn-primary" onclick="processData()">ANALYZE + SAVE SNAPSHOT</button>
  </div>
</div>

<!-- BOARD TAB -->
<div id="tab-board">
  <div class="board-header">
    <div class="board-title">Signal Board</div>
    <div style="display:flex;gap:8px;align-items:center">
      <span style="font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--muted)" id="lastUpdate">—</span>
      <button class="btn-secondary" style="font-family:'JetBrains Mono',monospace;font-size:9px;padding:5px 10px;border-radius:2px;border:1px solid var(--border2);background:none;color:var(--muted);cursor:pointer" onclick="resetDay()">NEW DAY</button>
    </div>
  </div>
  <div id="baselineBar" class="baseline-bar" style="display:none">
    <span>📌 BASELINE: <span id="baselineTime" style="color:var(--green)">—</span> · <span id="baselineBook" style="color:var(--green)">—</span></span>
    <button class="edit-btn" onclick="clearBaseline()">CLEAR</button>
  </div>
  <div id="summaryBar" class="summary-bar" style="display:none">
    <div class="sum-cell"><div class="sum-num" id="sumGames" style="color:var(--text)">0</div><div class="sum-desc">GAMES</div></div>
    <div class="sum-cell"><div class="sum-num" id="sumWhale" style="color:var(--green)">0</div><div class="sum-desc">WHALES</div></div>
    <div class="sum-cell"><div class="sum-num" id="sumTrap" style="color:var(--red)">0</div><div class="sum-desc">TRAPS</div></div>
    <div class="sum-cell"><div class="sum-num" id="sumMoved" style="color:var(--yellow)">0</div><div class="sum-desc">MOVED</div></div>
  </div>
  <div style="padding:0 16px 8px;display:flex;gap:6px">
    <button class="book-btn" id="board-circa" onclick="setBoardBook('Circa')" style="border:1px solid var(--green);background:var(--green);color:#000;flex:1;text-align:center;padding:7px">CIRCA</button>
    <button class="book-btn" id="board-dk" onclick="setBoardBook('DraftKings')" style="border:1px solid var(--border2);background:none;color:var(--muted);flex:1;text-align:center;padding:7px">DRAFTKINGS</button>
  </div>
  <div class="filter-bar">
    <button class="chip active" onclick="setFilter('all',this)">ALL</button>
    <button class="chip" onclick="setFilter('whale',this)">🐋 WHALES</button>
    <button class="chip" onclick="setFilter('trap',this)">🪤 TRAPS</button>
    <button class="chip" onclick="setFilter('moved',this)">📈 MOVED</button>
    <button class="chip" onclick="setFilter('Circa',this)">CIRCA</button>
    <button class="chip" onclick="setFilter('DraftKings',this)">DK</button>
    <button class="chip" onclick="setFilter('NBA',this)">NBA</button>
    <button class="chip" onclick="setFilter('NHL',this)">NHL</button>
    <button class="chip" onclick="setFilter('MLB',this)">MLB</button>
  </div>
  <div class="games-list" id="gamesList">
    <div class="empty-state"><div class="empty-icon">📋</div><div class="empty-title">No Data Yet</div><div class="empty-desc">Paste VSiN data above to start monitoring.</div></div>
  </div>
</div>

<!-- HISTORY TAB -->
<div id="tab-history" style="display:none">
  <div class="board-header">
    <div class="board-title">Snapshots</div>
    <button class="del-btn" onclick="clearAllSnaps()">CLEAR ALL</button>
  </div>
  <div class="history-panel" id="historyList"></div>
</div>

<!-- ANALYTICS TAB -->
<div id="tab-analytics" style="display:none">
  <div class="board-header">
    <div class="board-title">Analytics</div>
    <button class="del-btn" onclick="clearOutcomes()">CLEAR DATA</button>
  </div>
  <div class="analytics-panel" id="analyticsContent">
    <div class="empty-state"><div class="empty-icon">📊</div><div class="empty-title">No Data Yet</div><div class="empty-desc">Log game results from the Board tab to build your analytics.</div></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ─── STATE ───────────────────────────────────────────────
var snaps = []; // populated after migration
var gamesByBook = { 'Circa': [], 'DraftKings': [] };
var currentGames = [];
var _gr = {}; // global game registry - maps id to game object
var activeFilter = 'all';
var expandedCards = {};
var activeBook = 'Circa';
var boardBook = 'Circa'; // which book's board is currently displayed
var SPORTS = ['NBA','NHL','MLB','NFL','NCAAM'];

// ─── BOOK SELECTOR ───────────────────────────────────────
function setBook(book) {
  activeBook = book;
  var circa = document.getElementById('btn-circa');
  var dk = document.getElementById('btn-dk');
  var ind = document.getElementById('bookIndicator');
  circa.style.background = book === 'Circa' ? 'var(--green)' : 'none';
  circa.style.color = book === 'Circa' ? '#000' : 'var(--muted)';
  circa.style.borderColor = book === 'Circa' ? 'var(--green)' : 'var(--border2)';
  dk.style.background = book === 'DraftKings' ? 'var(--blue)' : 'none';
  dk.style.color = book === 'DraftKings' ? '#000' : 'var(--muted)';
  dk.style.borderColor = book === 'DraftKings' ? 'var(--blue)' : 'var(--border2)';
  ind.textContent = book === 'Circa' ? '● CIRCA' : '● DRAFTKINGS';
  ind.style.color = book === 'Circa' ? 'var(--green)' : 'var(--blue)';
}

// ─── STORAGE HELPERS ─────────────────────────────────────
function getStore(key) { try { return JSON.parse(localStorage.getItem(key) || '{}'); } catch(e) { return {}; } }
function setStore(key, val) { localStorage.setItem(key, JSON.stringify(val)); }
function getBaseline() { try { return JSON.parse(localStorage.getItem('sm_baseline')); } catch(e) { return null; } }
function setBaseline(snap) { localStorage.setItem('sm_baseline', JSON.stringify(snap)); updateBaselineUI(); }
function clearBaseline() { localStorage.removeItem('sm_baseline'); updateBaselineUI(); toast('BASELINE CLEARED'); }
function getMovLog(book) { return getStore('sm_mov_' + (book || 'Circa')); }
function setMovLog(book, log) { setStore('sm_mov_' + (book || 'Circa'), log); }
function getEstTotals() { return getStore('sm_est'); }
function saveEstTotal(id, val) { var s = getEstTotals(); if(val) s[id] = {value:parseFloat(val), t:now()}; else delete s[id]; setStore('sm_est', s); }
function getTipTimes() { return getStore('sm_tip'); }
function saveTipTime(id, str) {
  var s = getTipTimes();
  if (str) {
    var m = str.match(/(\d+):(\d+)\s*(AM|PM)/i);
    if (m) {
      var h = parseInt(m[1]), mn = parseInt(m[2]), ap = m[3].toUpperCase();
      if (ap === 'PM' && h !== 12) h += 12;
      if (ap === 'AM' && h === 12) h = 0;
      s[id] = { display: str.trim(), mins: h*60+mn, t: now() };
    }
  } else { delete s[id]; }
  setStore('sm_tip', s);
}
function getNotes() { return getStore('sm_notes'); }
function saveNote(id, txt) { var s = getNotes(); if(txt.trim()) s[id] = txt.trim(); else delete s[id]; setStore('sm_notes', s); }
function getOutcomes() { try { return JSON.parse(localStorage.getItem('sm_outcomes') || '[]'); } catch(e) { return []; } }
function now() { return new Date().toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit',hour12:true}); }
function mtHour(ts) { return new Date(ts - 7*3600000).getUTCHours(); }
function mtMins(ts) { return new Date(ts - 7*3600000).getUTCHours()*60 + new Date(ts - 7*3600000).getUTCMinutes(); }
function hrsBeforeTip(snapTs, tipMins) { return (tipMins - mtMins(snapTs)) / 60; }
function clearOutcomes() { if(!confirm('Clear all outcome data?')) return; localStorage.removeItem('sm_outcomes'); renderAnalytics(); toast('OUTCOMES CLEARED'); }

// ─── PARSER ──────────────────────────────────────────────
function stripSport(line) {
  for (var i=0; i<SPORTS.length; i++) {
    if (line.startsWith(SPORTS[i]+',')) return { sport:SPORTS[i], line:line.slice(SPORTS[i].length+1) };
  }
  return { sport:null, line:line };
}

function parseVSiN(raw) {
  var lines = raw.trim().split('\n').map(function(l){return l.trim();}).filter(Boolean);
  if (!lines.length) return [];
  var start = (lines[0].startsWith('Matchup') || lines[0].startsWith('Sport')) ? 1 : 0;
  var games = [], i = start, curSport = 'NBA';

  while (i < lines.length) {
    var rs = stripSport(lines[i]);
    if (!rs.line || rs.line.startsWith('Matchup') || rs.line.startsWith('Sport')) { i++; continue; }
    if (rs.sport) curSport = rs.sport;
    var awayTeam = rs.line;
    var block = [awayTeam];
    var j = i+1;
    while (j < lines.length) {
      var ls = stripSport(lines[j]);
      var l = ls.line;
      var isTeam = l.indexOf(',') < 0 && !/^[\-\+]?[\d\.]+$/.test(l) && l.length > 2;
      if (isTeam && block.length >= 6) break;
      block.push(l);
      j++;
    }
    var g = parseBlock(block, curSport, activeBook);
    if (g) games.push(g);
    i = j;
  }
  return games;
}

function parseBlock(block, sport, book) {
  if (block.length < 7) return null;
  try {
    var awayTeam = block[0].trim();
    var b1 = block[1].split(',');
    var homeTeam = b1[0].trim();
    var awaySpread = parseFloat(b1[1]) || 0;
    var b2 = block[2].split(',');
    var homeSpread = parseFloat(b2[0]) || 0;
    var awayHandle = parseFloat(b2[1]) || 0;
    var b3 = block[3].split(',');
    var homeHandle = parseFloat(b3[0]) || 0;
    var awayBets = parseFloat(b3[1]) || 0;
    var b4 = block[4].split(',');
    var homeBets = parseFloat(b4[0]) || 0;
    var total = parseFloat(b4[1]) || 0;
    var b5 = block[5].split(',');
    var overHandle = parseFloat(b5[1]) || 50;
    var b6 = block[6].split(',');
    var underHandle = parseFloat(b6[0]) || 50;
    var overBets = parseFloat(b6[1]) || 50;
    var underBets = parseFloat(block[7]) || 50;

    if (!homeTeam || !awayTeam) return null;

    // Signal detection
    var awayDom = awayHandle > homeHandle;
    var sharpH = awayDom ? awayHandle : homeHandle;
    var sharpB = awayDom ? awayBets : homeBets;
    var sharpDelta = sharpH - sharpB;
    var sharpTeam = awayDom ? awayTeam : homeTeam;
    var pubB = awayDom ? homeBets : awayBets;
    var pubH = awayDom ? homeHandle : awayHandle;

    var spreadSig = 'neutral', spreadSide = null;
    if (sharpH >= 55 && sharpDelta >= 15) { spreadSig = 'whale'; spreadSide = sharpTeam; }
    else if (pubB >= 65 && pubH < pubB-15) { spreadSig = 'trap'; spreadSide = awayDom ? homeTeam : awayTeam; }

    var overDelta = overHandle - overBets;
    var underDelta = underHandle - underBets;
    var totalSig = 'neutral', totalSide = null;
    if (overHandle >= 60 && overDelta >= 15) { totalSig = 'whale'; totalSide = 'OVER'; }
    else if (underHandle >= 60 && underDelta >= 15) { totalSig = 'whale'; totalSide = 'UNDER'; }
    else if (overBets >= 65 && overHandle < overBets-15) { totalSig = 'trap'; totalSide = 'UNDER'; }
    else if (underBets >= 65 && underHandle < underBets-15) { totalSig = 'trap'; totalSide = 'OVER'; }

    var id = (awayTeam+'_'+homeTeam).replace(/\s+/g,'_');

    return {
      id:id, awayTeam:awayTeam, homeTeam:homeTeam, sport:sport, book:book,
      awaySpread:awaySpread, homeSpread:homeSpread,
      awayHandle:awayHandle, homeHandle:homeHandle,
      awayBets:awayBets, homeBets:homeBets,
      total:total, overHandle:overHandle, underHandle:underHandle,
      overBets:overBets, underBets:underBets,
      spreadDelta:sharpDelta, sharpTeam:sharpTeam,
      overallSig: spreadSig !== 'neutral' ? spreadSig : totalSig,
      spreadSig:spreadSig, spreadSide:spreadSide,
      totalSig:totalSig, totalSide:totalSide
    };
  } catch(e) { return null; }
}

// ─── SIGNAL SCORE ────────────────────────────────────────
function signalScore(g, movLog) {
  var s = 0;
  var delta = Math.abs(g.spreadDelta || 0);
  if (delta >= 40) s += 3; else if (delta >= 25) s += 2; else if (delta >= 15) s += 1;
  var td = Math.abs((g.overHandle||0)-(g.overBets||0));
  if (td >= 30) s += 2; else if (td >= 15) s += 1;
  var log = movLog[g.id] || [];
  var bookLog = log.filter(function(m){return !m.book || m.book === g.book;});
  var hasMov = bookLog.some(function(m){return m.field==='SPREAD';});
  if (hasMov) s += 2;
  if (bookLog.length >= 4) s += 2; else if (bookLog.length >= 2) s += 1;
  return Math.min(s, 10);
}

function scoreClass(s) { return s>=8?'badge-score-strong':s>=5?'badge-score-mod':'badge-score-weak'; }
function scoreLabel(s) { return s>=8?'STRONG':s>=5?'MODERATE':'WEAK'; }

// ─── MOVEMENT DETECTION ──────────────────────────────────
function detectMovements(games) {
  if (!games.length) return {};
  var book = games[0].book || 'Circa';
  var baseline = getBaseline();
  var baselineBook = baseline && baseline.games && baseline.games.length ? (baseline.games[0].book || 'Circa') : null;
  var compareSnap = null;
  if (baseline && baselineBook === book) {
    compareSnap = baseline;
  } else {
    var sameBook = snaps.filter(function(s){ return s.games && s.games.length && (s.games[0].book||'Circa')===book; });
    if (sameBook.length >= 2) compareSnap = sameBook[sameBook.length-2];
    else if (sameBook.length === 1) compareSnap = sameBook[0];
  }
  if (!compareSnap) return {};
  var prev = compareSnap.games;
  var movs = {};
  games.forEach(function(g) {
    var pg = null;
    for (var k=0; k<prev.length; k++) { if(prev[k].id===g.id){pg=prev[k];break;} }
    if (!pg) return;
    var ms = [];
    if (Math.abs(g.awaySpread - pg.awaySpread) >= 0.5) ms.push({field:'SPREAD',from:pg.awaySpread,to:g.awaySpread,dir:g.awaySpread>pg.awaySpread?'up':'dn',team:g.awayTeam,book:book});
    if (Math.abs(g.total - pg.total) >= 0.5) ms.push({field:'TOTAL',from:pg.total,to:g.total,dir:g.total>pg.total?'up':'dn',book:book});
    if (Math.abs(g.awayHandle - pg.awayHandle) >= 15) ms.push({field:'HANDLE',from:pg.awayHandle,to:g.awayHandle,dir:g.awayHandle>pg.awayHandle?'up':'dn',team:g.awayTeam,book:book});
    if (ms.length) movs[g.id] = ms;
  });
  return movs;
}

// ─── PROCESS DATA ────────────────────────────────────────
function processData() {
  var raw = document.getElementById('pasteInput').value.trim();
  if (!raw) { toast('PASTE DATA FIRST'); return; }
  var games = parseVSiN(raw);
  if (!games.length) { toast('PARSE FAILED — CHECK FORMAT'); return; }

  var movements = detectMovements(games);

  // Log movements to book-specific store
  if (Object.keys(movements).length) {
    var log = getMovLog(activeBook);
    Object.keys(movements).forEach(function(id) {
      if (!log[id]) log[id] = [];
      movements[id].forEach(function(m) { log[id].push(Object.assign({},m,{time:now(),ts:Date.now()})); });
    });
    setMovLog(activeBook, log);
  }

  var snap = { id:Date.now(), time:now(), ts:Date.now(), games:games, gameCount:games.length, book:activeBook };

  // Auto-set baseline for this book if first snap of book today
  var sameBook = snaps.filter(function(s){return (s.games&&s.games.length&&(s.games[0].book||'Circa'))===activeBook;});
  var bl = getBaseline();
  var blBook = bl && bl.games && bl.games.length ? (bl.games[0].book||'Circa') : null;
  if (sameBook.length === 0 && blBook !== activeBook) { setBaseline(snap); toast('📌 '+activeBook.toUpperCase()+' BASELINE SET — '+snap.time); }

  snaps.push(snap);
  if (snaps.length > 20) snaps.shift();
  setStore('sm_snaps', snaps);

  gamesByBook[activeBook] = games;
  currentGames = games;
  boardBook = activeBook;
  document.getElementById('snapCount').textContent = snaps.length;
  document.getElementById('lastUpdate').textContent = snap.time;
  document.getElementById('pasteInput').value = '';

  updateBoardBookTabs();
  renderBoard(games, movements);
  toast('✓ '+games.length+' GAMES PARSED');
}

// ─── BOARD BOOK SWITCHER ─────────────────────────────────
function setBoardBook(book) {
  boardBook = book;
  currentGames = gamesByBook[book] || [];
  updateBoardBookTabs();
  var movs = currentGames.length ? detectMovements(currentGames) : {};
  renderBoard(currentGames, movs);
}

function updateBoardBookTabs() {
  var circa = document.getElementById('board-circa');
  var dk = document.getElementById('board-dk');
  if (!circa || !dk) return;
  var circaHas = gamesByBook['Circa'] && gamesByBook['Circa'].length;
  var dkHas = gamesByBook['DraftKings'] && gamesByBook['DraftKings'].length;

  circa.style.background = boardBook === 'Circa' ? 'var(--green)' : 'none';
  circa.style.color = boardBook === 'Circa' ? '#000' : (circaHas ? 'var(--text)' : 'var(--muted)');
  circa.style.borderColor = boardBook === 'Circa' ? 'var(--green)' : (circaHas ? '#444' : 'var(--border2)');
  circa.textContent = 'CIRCA' + (circaHas ? ' ('+gamesByBook['Circa'].length+')' : '');

  dk.style.background = boardBook === 'DraftKings' ? 'var(--blue)' : 'none';
  dk.style.color = boardBook === 'DraftKings' ? '#000' : (dkHas ? 'var(--text)' : 'var(--muted)');
  dk.style.borderColor = boardBook === 'DraftKings' ? 'var(--blue)' : (dkHas ? '#444' : 'var(--border2)');
  dk.textContent = 'DRAFTKINGS' + (dkHas ? ' ('+gamesByBook['DraftKings'].length+')' : '');
}

// ─── RENDER BOARD ────────────────────────────────────────
function renderBoard(games, movements) {
  var list = document.getElementById('gamesList');
  var sumBar = document.getElementById('summaryBar');
  movements = movements || {};

  if (!games.length) {
    list.innerHTML = '<div class="empty-state"><div class="empty-icon">📋</div><div class="empty-title">No Data Yet</div><div class="empty-desc">Paste VSiN data above to start monitoring.</div></div>';
    sumBar.style.display = 'none';
    return;
  }

  // Register games in global registry
  games.forEach(function(g) { _gr[g.id] = g; });

  // Attach movement info to games
  games.forEach(function(g) {
    var ms = movements[g.id] || [];
    g.spreadMove = null; g.totalMove = null;
    ms.forEach(function(m) {
      if (m.field==='SPREAD' && Math.abs(m.to-m.from)>=0.5) g.spreadMove = parseFloat((m.to-m.from).toFixed(1));
      if (m.field==='TOTAL' && Math.abs(m.to-m.from)>=0.5) g.totalMove = parseFloat((m.to-m.from).toFixed(1));
    });
  });

  // Summary
  sumBar.style.display = 'grid';
  var whales = games.filter(function(g){return g.overallSig==='whale';}).length;
  var traps = games.filter(function(g){return g.overallSig==='trap';}).length;
  var moved = Object.keys(movements).length;
  document.getElementById('sumGames').textContent = games.length;
  document.getElementById('sumWhale').textContent = whales;
  document.getElementById('sumTrap').textContent = traps;
  document.getElementById('sumMoved').textContent = moved;

  // Filter
  var filtered = games.slice();
  if (activeFilter === 'whale') filtered = games.filter(function(g){return g.overallSig==='whale';});
  else if (activeFilter === 'trap') filtered = games.filter(function(g){return g.overallSig==='trap';});
  else if (activeFilter === 'moved') filtered = games.filter(function(g){return movements[g.id];});
  else if (activeFilter === 'Circa' || activeFilter === 'DraftKings') filtered = games.filter(function(g){return (g.book||'Circa')===activeFilter;});
  else if (SPORTS.indexOf(activeFilter) >= 0) filtered = games.filter(function(g){return g.sport===activeFilter;});

  // Sort: signals first, then delta
  filtered.sort(function(a,b) {
    var order = {whale:0,trap:1,neutral:2};
    var ao = order[a.overallSig], bo = order[b.overallSig];
    if (ao !== bo) return ao-bo;
    return Math.abs(b.spreadDelta)-Math.abs(a.spreadDelta);
  });

  list.innerHTML = filtered.map(function(g){ return renderCard(g, movements[g.id]||[]); }).join('');

  // Single delegated listener for all card interactions
  list.onclick = function(e) {
    var btn = e.target.closest('[data-action]');
    if (!btn) return;
    var action = btn.getAttribute('data-action');
    var gid = btn.getAttribute('data-gid');
    e.stopPropagation();
    if (action === 'log') doLog(gid);
    else if (action === 'lockest') doLockEst(gid);
    else if (action === 'locktip') doLockTip(gid);
    else if (action === 'editest') { saveEstTotal(gid, null); rerenderCard(gid); }
    else if (action === 'edittip') { saveTipTime(gid, null); rerenderCard(gid); }
    else if (action === 'toggle') toggleCard(gid);
  };

  // Note save via delegated change
  list.onchange = function(e) {
    if (e.target.classList.contains('sm-note')) {
      saveNote(e.target.getAttribute('data-gid'), e.target.value);
    }
  };
}

function renderCard(g, moves) {
  var isExp = expandedCards[g.id];
  var movLog = getMovLog(g.book||'Circa');
  var bookLog = (movLog[g.id]||[]).filter(function(m){return !m.book||m.book===(g.book||'Circa');});
  var score = (g.spreadSig!=='neutral'||g.totalSig!=='neutral') ? signalScore(g, movLog) : 0;

  var mtH = mtHour(Date.now());
  var goodHours = [6,7,9,12,13,19,21];
  var inGood = goodHours.indexOf(mtH)>=0;
  var winColor = inGood?'var(--green)':mtH>=16&&mtH<=19?'var(--yellow)':'var(--muted)';
  var winLabel = inGood?'✓ GOOD WINDOW':mtH>=16&&mtH<=19?'⚠ MARGINAL':'— OFF WINDOW';

  var totalBadge = g.totalSig!=='neutral'?'<span class="badge badge-'+(g.totalSig==='whale'?'whale':'trap')+'">'+( g.totalSig==='whale'?'🐋':'🪤')+' '+g.totalSide+'</span>':'';
  var movBadge = moves.length?'<span class="badge badge-moved">📈 MOVED</span>':'';

    +'<div class="delta-row" style="border-top:none"><span class="delta-label">BETTING WINDOW</span><span style="font-family:JetBrains Mono,monospace;font-size:11px;color:'+winColor+'">'+winLabel+'</span></div>'
    +estHTML+tipHTML+notesHTML+logHTML+movHTML
  ) : '';

  return '<div class="game-card '+cardClass+'" id="card-'+g.id+'">'
    +'<div class="card-header" onclick="toggleCard(&quot;'+g.id+'&quot;)">'
      +'<div>'
        +'<div style="font-size:13px;font-weight:500"><span style="font-family:JetBrains Mono,monospace;font-size:9px;color:'+bookColor+';margin-right:4px">'+( g.book||'Circa')+'</span><span style="font-family:JetBrains Mono,monospace;font-size:9px;color:var(--muted);margin-right:4px">'+g.sport+'</span>'+awayN+' <span style="color:var(--muted);font-size:10px">@</span> '+homeN+'</div>'
        +'<div class="matchup-line">'+spreadBadge+totalBadge+movBadge+scoreBadge+sTag+tTag+'</div>'
      +'</div>'
      +'<span style="color:var(--muted);font-size:14px">'+(isExp?'▲':'▼')+'</span>'
    +'</div>'
    +(isExp?'<div class="card-body-shown">'+body+'</div>':'')
    +'<div class="expand-toggle" onclick="toggleCard(&quot;'+g.id+'&quot;)"><span>'+(isExp?'COLLAPSE ▲':'EXPAND ▼')+'</span></div>'
    +'</div>';
}

// ─── OUTCOME LOGGING ─────────────────────────────────────
function doLog(id) {
  var g = _gr[id] || currentGames.filter(function(x){return x.id===id;})[0];
  if (!g) { toast('GAME NOT FOUND'); return; }
  var awayInput = document.querySelector('.sm-away[data-gid="'+id+'"]');
  var homeInput = document.querySelector('.sm-home[data-gid="'+id+'"]');
  if (!awayInput || !homeInput) { toast('EXPAND CARD FIRST'); return; }
  var aS = parseInt(awayInput.value);
  var hS = parseInt(homeInput.value);
  if (isNaN(aS)||isNaN(hS)) { toast('ENTER BOTH SCORES'); return; }

  var tipTimes = getTipTimes();
  var tip = tipTimes[id];
  var movLog = getMovLog(g.book||'Circa');
  var bookLog = (movLog[id]||[]).filter(function(m){return !m.book||m.book===(g.book||'Circa');});

  // Build snapshot readings with hours before tip
  var readings = [];
  snaps.forEach(function(snap) {
    var sg = snap.games && snap.games.filter(function(x){return x.id===id;})[0];
    if (!sg) return;
    var h = mtHour(snap.ts);
    var hbt = tip ? hrsBeforeTip(snap.ts, tip.mins) : null;

    var awayDom = sg.awayHandle > sg.homeHandle;
    var sharpH = awayDom ? sg.awayHandle : sg.homeHandle;
    var sharpB = awayDom ? sg.awayBets : sg.homeBets;
    var delta = sharpH - sharpB;
    var sharpTeamSide = awayDom ? 'away' : 'home';

    var combined = aS + hS;
    var spreadCorrect = null;
    if (delta >= 15 && sharpH >= 55) {
      spreadCorrect = awayDom ? (aS + sg.awaySpread) > hS : (hS + Math.abs(sg.awaySpread)) > aS;
    }
    var totalCorrect = null;
    var od = sg.overHandle - sg.overBets;
    var ud = sg.underHandle - sg.underBets;
    if (sg.overHandle >= 60 && od >= 15) totalCorrect = combined > sg.total;
    else if (sg.underHandle >= 60 && ud >= 15) totalCorrect = combined < sg.total;

    readings.push({ time:snap.time, ts:snap.ts, hourMT:h, hrsBeforeTip:hbt, awayHandle:sg.awayHandle, homeHandle:sg.homeHandle, awayBets:sg.awayBets, homeBets:sg.homeBets, overHandle:sg.overHandle, underHandle:sg.underHandle, overBets:sg.overBets, underBets:sg.underBets, sharpSide:sharpTeamSide, sharpH:sharpH, sharpDelta:delta, spreadCorrect:spreadCorrect, totalCorrect:totalCorrect, isLegacy:false });
  });

  // Final spread/total correct from last reading
  var lastR = readings[readings.length-1];
  var spreadCorrect = lastR ? lastR.spreadCorrect : null;
  var totalCorrect = lastR ? lastR.totalCorrect : null;

  // Est total
  var estTotals = getEstTotals();
  var est = estTotals[id];
  var estGap = est ? est.value - g.total : null;

  // Handle swing calc
  var spreadHandleSwing = null, totalHandleSwing = null;
  if (readings.length >= 2) {
    var first = readings[0], last = readings[readings.length-1];
    var fSide = first.awayHandle > first.homeHandle ? 'away' : 'home';
    var lSide = last.awayHandle > last.homeHandle ? 'away' : 'home';
    var flipped = fSide !== lSide;
    var fH = fSide==='away'?first.awayHandle:first.homeHandle;
    var lH = lSide==='away'?last.awayHandle:last.homeHandle;
    spreadHandleSwing = flipped ? -lH : (lH - fH);
    var fOD = first.overHandle > first.underHandle;
    var lOD = last.overHandle > last.underHandle;
    var tFlip = fOD !== lOD;
    var fTH = fOD?first.overHandle:first.underHandle;
    var lTH = lOD?last.overHandle:last.underHandle;
    totalHandleSwing = tFlip ? -lTH : (lTH - fTH);
  }

  var outcomes = getOutcomes();
  var filtered = outcomes.filter(function(o){return o.gameId!==id;});
  filtered.push({
    gameId:id, awayTeam:g.awayTeam, homeTeam:g.homeTeam, sport:g.sport, book:g.book||'Circa',
    awayScore:aS, homeScore:hS, date:new Date().toLocaleDateString(),
    spreadCorrect:spreadCorrect, totalCorrect:totalCorrect,
    spreadSide:g.spreadSide, totalSide:g.totalSide,
    awaySpread:g.awaySpread, total:g.total,
    estTotal:est?est.value:null, marketTotalAtBet:g.total, estGap:estGap,
    spreadHandleSwing:spreadHandleSwing, totalHandleSwing:totalHandleSwing,
    snapshotReadings:readings, isLegacy:false
  });
  localStorage.setItem('sm_outcomes', JSON.stringify(filtered));
  toast('✓ RESULT LOGGED');
  renderAnalytics();
}

// ─── ANALYTICS ───────────────────────────────────────────
function pct(arr) {
  if(!arr||!arr.length) return '—';
  return Math.round(arr.filter(Boolean).length/arr.length*100)+'%';
}

function barHTML(arr, color) {
  if(!arr||!arr.length) return '';
  var p = arr.filter(Boolean).length/arr.length;
  var c = color||(p>=0.55?'var(--green)':p>=0.45?'var(--yellow)':'var(--red)');
  return '<div class="a-bar"><div class="a-bar-fill" style="width:'+Math.round(p*100)+'%;background:'+c+'"></div></div>';
}

function aColor(arr) {
  if(!arr||!arr.length) return 'var(--muted)';
  var p = arr.filter(Boolean).length/arr.length;
  return p>=0.55?'var(--green)':p>=0.45?'var(--yellow)':'var(--red)';
}

function aRow(label, arr, sub) {
  var p = pct(arr); var c = aColor(arr);
  return '<div class="a-row"><div><div class="a-row-label">'+label+'</div>'+(sub?'<div class="a-row-sub">'+sub+'</div>':'')+barHTML(arr)+'</div><div class="a-games">'+(arr?arr.length:0)+'g</div><div class="a-pct" style="color:'+c+'">'+p+'</div></div>';
}

function renderAnalytics() {
  var el = document.getElementById('analyticsContent');
  var outcomes = getOutcomes();
  if (!outcomes.length) {
    el.innerHTML = '<div class="empty-state"><div class="empty-icon">📊</div><div class="empty-title">No Data Yet</div><div class="empty-desc">Log game results from the Board tab to build your analytics.</div></div>';
    return;
  }

  var html = '';

  // Legacy warning
  var legacy = outcomes.filter(function(o){return o.isLegacy;});
  if (legacy.length) html += '<div class="warn-bar">⚠ '+legacy.length+' LEGACY ENTRIES — Re-log to include in time breakdowns</div>';

  // Overall
  var sOut = outcomes.filter(function(o){return o.spreadCorrect!==null;});
  var tOut = outcomes.filter(function(o){return o.totalCorrect!==null;});
  html += '<div class="a-section-title">Overall Accuracy</div>';
  html += '<div class="stat-grid"><div class="stat-cell"><div class="stat-num" style="color:'+aColor(sOut.map(function(o){return o.spreadCorrect;}))+'">'+pct(sOut.map(function(o){return o.spreadCorrect;}))+'</div><div class="stat-desc">SPREAD<br>'+sOut.length+' GAMES</div></div><div class="stat-cell"><div class="stat-num" style="color:'+aColor(tOut.map(function(o){return o.totalCorrect;}))+'">'+pct(tOut.map(function(o){return o.totalCorrect;}))+'</div><div class="stat-desc">TOTAL<br>'+tOut.length+' GAMES</div></div></div>';

  // Flatten all readings (non-legacy)
  var allR = [];
  outcomes.forEach(function(o) {
    if (o.isLegacy) {
      allR.push({hourMT:null,spreadCorrect:o.spreadCorrect,totalCorrect:o.totalCorrect,signalScore:0,sport:o.sport,book:o.book||'Circa',hrsBeforeTip:null,isLegacy:true});
    } else {
      (o.snapshotReadings||[]).forEach(function(r){
        allR.push(Object.assign({},r,{sport:o.sport,book:o.book||'Circa'}));
      });
    }
  });

  // By time bucket
  var buckets = {'Early AM (5-9AM)':{s:[],t:[]},'Mid Morning (9-12PM)':{s:[],t:[]},'Afternoon (12-4PM)':{s:[],t:[]},'Evening (4-8PM)':{s:[],t:[]},'Night (8PM+)':{s:[],t:[]}};
  function getBucket(h) {
    if(h>=5&&h<9) return 'Early AM (5-9AM)';
    if(h>=9&&h<12) return 'Mid Morning (9-12PM)';
    if(h>=12&&h<16) return 'Afternoon (12-4PM)';
    if(h>=16&&h<20) return 'Evening (4-8PM)';
    return 'Night (8PM+)';
  }
  allR.forEach(function(r) {
    if(r.hourMT===null||r.isLegacy) return;
    var b = getBucket(r.hourMT);
    if(r.spreadCorrect!==null) buckets[b].s.push(r.spreadCorrect);
    if(r.totalCorrect!==null) buckets[b].t.push(r.totalCorrect);
  });

  html += '<div class="a-section-title" style="margin-top:16px">Accuracy By Time (MT)</div>';
  html += '<div class="a-subtitle">Each snapshot reading evaluated separately</div>';
  html += '<div class="a-table">';
  Object.keys(buckets).forEach(function(b) {
    var d = buckets[b];
    var all = d.s.concat(d.t);
    if(!all.length) return;
    html += '<div class="a-row"><div><div class="a-row-label">'+b+'</div>'+barHTML(all)+'</div>';
    html += '<div style="text-align:center"><div class="a-games">SPRD</div><div class="a-pct" style="font-size:12px;color:'+aColor(d.s)+'">'+pct(d.s)+'</div></div>';
    html += '<div style="text-align:center"><div class="a-games">TOTL</div><div class="a-pct" style="font-size:12px;color:'+aColor(d.t)+'">'+pct(d.t)+'</div></div></div>';
  });
  html += '</div>';

  // Handle swing by time window (needs tip time)
  var withTip = outcomes.filter(function(o){ return (o.snapshotReadings||[]).some(function(r){return r.hrsBeforeTip!==null;}); });
  if (withTip.length) {
    html += '<div class="a-section-title" style="margin-top:16px">Signal Accuracy By Window</div>';
    html += '<div class="a-subtitle">'+withTip.length+' games with tip time locked</div>';
    var windows = [{label:'4+ hrs before',min:4,max:99},{label:'2-4 hrs before',min:2,max:4},{label:'1-2 hrs before',min:1,max:2},{label:'Final hour',min:0,max:1}];
    var sWin = {}, tWin = {};
    windows.forEach(function(w){sWin[w.label]=[];tWin[w.label]=[];});
    var flipFollow = [], flipHold = [];
    withTip.forEach(function(o) {
      var rs = o.snapshotReadings||[];
      var lastR = rs[rs.length-1];
      var lastSide = lastR&&lastR.awayHandle>lastR.homeHandle?'away':'home';
      var lastOD = lastR&&lastR.overHandle>lastR.underHandle;
      windows.forEach(function(w) {
        var wr = rs.filter(function(r){return r.hrsBeforeTip!==null&&r.hrsBeforeTip>=w.min&&r.hrsBeforeTip<w.max;});
        if(!wr.length) return;
        var mid = wr[Math.floor(wr.length/2)];
        if(o.spreadCorrect!==null) sWin[w.label].push(o.spreadCorrect);
        if(o.totalCorrect!==null) tWin[w.label].push(o.totalCorrect);
      });
      // Flip analysis: 4hr vs final
      var r4 = rs.filter(function(r){return r.hrsBeforeTip!==null&&r.hrsBeforeTip>=4;})[0];
      if(r4&&lastR&&o.spreadCorrect!==null) {
        var s4 = r4.awayHandle>r4.homeHandle?'away':'home';
        if(s4!==lastSide) { flipFollow.push(o.spreadCorrect); flipHold.push(!o.spreadCorrect); }
      }
    });
    html += '<div class="a-table">';
    windows.forEach(function(w) {
      var sa = sWin[w.label], ta = tWin[w.label];
      if(!sa.length&&!ta.length) return;
      html += '<div class="a-row"><div><div class="a-row-label">'+w.label+'</div>'+barHTML(sa.concat(ta))+'</div>';
      html += '<div style="text-align:center"><div class="a-games">SPRD</div><div class="a-pct" style="font-size:12px;color:'+aColor(sa)+'">'+pct(sa)+'</div></div>';
      html += '<div style="text-align:center"><div class="a-games">TOTL</div><div class="a-pct" style="font-size:12px;color:'+aColor(ta)+'">'+pct(ta)+'</div></div></div>';
    });
    html += '</div>';

    if(flipFollow.length) {
      html += '<div class="a-section-title" style="margin-top:16px">When Signal Flipped — Follow or Hold?</div>';
      html += '<div class="a-subtitle">'+flipFollow.length+' games where 4hr+ signal reversed before tip</div>';
      html += '<div class="a-table"><div style="padding:12px 14px"><div class="flip-grid">';
      html += '<div class="flip-box"><div class="flip-box-label">FOLLOW FLIP</div><div class="flip-box-val" style="color:'+aColor(flipFollow)+'">'+pct(flipFollow)+'</div></div>';
      html += '<div class="flip-box"><div class="flip-box-label">HOLD ORIGINAL</div><div class="flip-box-val" style="color:'+aColor(flipHold)+'">'+pct(flipHold)+'</div></div>';
      html += '</div></div></div>';
    }
  } else {
    html += '<div class="a-table" style="margin-top:8px"><div style="padding:14px;font-size:12px;color:var(--muted)">🔒 Lock tip times on game cards to enable signal window analysis.</div></div>';
  }

  // Signal strength
  var sg8=[], sg5=[], sg1=[];
  allR.forEach(function(r) {
    if(r.isLegacy||r.spreadCorrect===null&&r.totalCorrect===null) return;
    var s = r.signalScore||0;
    var v = r.spreadCorrect!==null?r.spreadCorrect:r.totalCorrect;
    if(s>=8) sg8.push(v); else if(s>=5) sg5.push(v); else if(s>0) sg1.push(v);
  });
  if(sg8.length||sg5.length||sg1.length) {
    html += '<div class="a-section-title" style="margin-top:16px">By Signal Strength</div>';
    html += '<div class="a-table">'+aRow('Strong (8-10)',sg8)+aRow('Moderate (5-7)',sg5)+aRow('Weak (1-4)',sg1)+'</div>';
  }

  // Est total
  var estOut = outcomes.filter(function(o){return o.estTotal&&o.estGap!==null;});
  if(estOut.length) {
    html += '<div class="a-section-title" style="margin-top:16px">VSiN Estimated Total</div>';
    html += '<div class="a-subtitle">'+estOut.length+' games with est total logged</div>';
    var overLean = estOut.filter(function(o){return o.estGap>=1.5;});
    var underLean = estOut.filter(function(o){return o.estGap<=-1.5;});
    var overAcc = overLean.map(function(o){return (o.awayScore+o.homeScore)>o.marketTotalAtBet;});
    var underAcc = underLean.map(function(o){return (o.awayScore+o.homeScore)<o.marketTotalAtBet;});
    html += '<div class="a-table">'+aRow('EST > Market (Lean OVER)',overAcc,overLean.length+' games, est 1.5+ above line')+aRow('EST < Market (Lean UNDER)',underAcc,underLean.length+' games, est 1.5+ below line')+'</div>';
  }

  // By book
  html += '<div class="a-section-title" style="margin-top:16px">By Book</div>';
  ['Circa','DraftKings'].forEach(function(bk) {
    var bkOut = outcomes.filter(function(o){return (o.book||'Circa')===bk;});
    var bkR = allR.filter(function(r){return (r.book||'Circa')===bk&&!r.isLegacy;});
    var bkColor = bk==='DraftKings'?'var(--blue)':'var(--green)';
    var borderColor = bk==='DraftKings'?'rgba(0,176,255,.3)':'rgba(0,255,135,.3)';
    var bkS = bkOut.filter(function(o){return o.spreadCorrect!==null;}).map(function(o){return o.spreadCorrect;});
    var bkT = bkOut.filter(function(o){return o.totalCorrect!==null;}).map(function(o){return o.totalCorrect;});
    html += '<div class="book-section" style="border:1px solid '+borderColor+'">';
    html += '<div class="book-header"><span style="font-family:JetBrains Mono,monospace;font-size:12px;font-weight:700;color:'+bkColor+'">'+bk.toUpperCase()+'</span>';
    if(bkOut.length) {
      html += '<div class="book-stats"><div class="book-stat"><div class="book-stat-num" style="color:'+aColor(bkS)+'">'+pct(bkS)+'</div><div class="book-stat-label">SPREAD · '+bkS.length+'g</div></div><div class="book-stat"><div class="book-stat-num" style="color:'+aColor(bkT)+'">'+pct(bkT)+'</div><div class="book-stat-label">TOTAL · '+bkT.length+'g</div></div></div>';
    } else {
      html += '<span style="font-size:11px;color:var(--muted)">No data yet</span>';
    }
    html += '</div></div>';
  });

  // Recent results
  html += '<div class="a-section-title" style="margin-top:16px">Recent Results</div>';
  html += '<div class="a-table">';
  outcomes.slice().reverse().slice(0,20).forEach(function(o) {
    var aS = o.awayTeam.split(' ').pop(), hS = o.homeTeam.split(' ').pop();
    var sc = o.spreadCorrect, tc = o.totalCorrect;
    html += '<div class="a-row" style="grid-template-columns:1fr auto"><div><div class="a-row-label">'+aS+' @ '+hS+'</div><div class="a-row-sub">'+o.date+' · '+o.sport+' · '+o.awayScore+'-'+o.homeScore+' · '+(o.snapshotReadings?o.snapshotReadings.length:0)+' snaps</div>'+(o.isLegacy?'<div style="font-size:9px;color:var(--yellow)">⚠ Legacy</div>':'')+'</div>';
    html += '<div style="display:flex;gap:4px;align-items:center">';
    if(sc!==null) html += '<span class="badge" style="background:'+(sc?'rgba(0,255,135,.1)':'rgba(255,61,90,.1)')+';color:'+(sc?'var(--green)':'var(--red)')+';border:none">'+(sc?'SPRD ✓':'SPRD ✗')+'</span>';
    if(tc!==null) html += '<span class="badge" style="background:'+(tc?'rgba(0,255,135,.1)':'rgba(255,61,90,.1)')+';color:'+(tc?'var(--green)':'var(--red)')+';border:none">'+(tc?'TOTL ✓':'TOTL ✗')+'</span>';
    html += '</div></div>';
  });
  html += '</div>';

  el.innerHTML = html;
}

// ─── TOAST ───────────────────────────────────────────────
function toast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(function(){t.classList.remove('show');}, 2500);
}

// ─── MIGRATION — copy old key format to new keys ────────
(function() {
  var keyMap = {
    'sharpmon_snaps': 'sm_snaps',
    'sharpmon_outcomes': 'sm_outcomes',
    'sharpmon_baseline': 'sm_baseline',
    'sharpmon_esttotals': 'sm_est',
    'sharpmon_tiptimes': 'sm_tip',
    'sharpmon_notes': 'sm_notes',
    'sharpmon_movelog': 'sm_mov_Circa',
    'sharpmon_movelog_Circa': 'sm_mov_Circa',
    'sharpmon_movelog_DraftKings': 'sm_mov_DraftKings'
  };
  Object.keys(keyMap).forEach(function(oldKey) {
    var newKey = keyMap[oldKey];
    var oldVal = localStorage.getItem(oldKey);
    if (oldVal && !localStorage.getItem(newKey)) {
      localStorage.setItem(newKey, oldVal);
    }
  });
  // Also migrate old outcomes — mark as legacy if missing snapshotReadings
  try {
    var outcomes = JSON.parse(localStorage.getItem('sm_outcomes') || '[]');
    var changed = false;
    outcomes = outcomes.map(function(o) {
      if (!o.hasOwnProperty('isLegacy')) {
        o.isLegacy = !(o.snapshotReadings && o.snapshotReadings.length);
        changed = true;
      }
      return o;
    });
    if (changed) localStorage.setItem('sm_outcomes', JSON.stringify(outcomes));
  } catch(e) {}
})();

// ─── INIT ────────────────────────────────────────────────
snaps = JSON.parse(localStorage.getItem('sm_snaps') || '[]');
document.getElementById('snapCount').textContent = snaps.length;
updateBaselineUI();

// Restore last games for each book from snapshots
if (snaps.length) {
  ['Circa', 'DraftKings'].forEach(function(bk) {
    var bookSnaps = snaps.filter(function(s){ return (s.book||'Circa') === bk; });
    if (bookSnaps.length) {
      gamesByBook[bk] = bookSnaps[bookSnaps.length-1].games || [];
    }
  });
  var last = snaps[snaps.length-1];
  boardBook = last.book || 'Circa';
  currentGames = gamesByBook[boardBook];
  document.getElementById('lastUpdate').textContent = last.time;
  var movs = currentGames.length ? detectMovements(currentGames) : {};
  updateBoardBookTabs();
  renderBoard(currentGames, movs);
}
</script>
